<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Precios</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#fff;
color:#000;
padding:10px;
}

/* CONTENEDOR */

.container{
max-width:1000px;
margin:auto;
border:1px solid #000;
}

/* HEADER */

.header{
background:#000;
color:#fff;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
font-size:16px;
font-weight:normal;
}

/* TOOLBAR */

.toolbar{
padding:10px;
border-bottom:1px solid #000;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:10px 14px;
border:1px solid #000;
background:#000;
color:#fff;
cursor:pointer;
font-size:14px;
}

button.secondary{
background:#fff;
color:#000;
}

button:hover{
opacity:0.8;
}

/* BUSCADOR */

.search{
flex:1;
}

.search input{
width:100%;
padding:10px;
border:1px solid #000;
font-size:14px;
}

/* TABLA */

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
border-bottom:2px solid #000;
padding:10px;
text-align:left;
font-size:14px;
}

td{
border-bottom:1px solid #ddd;
padding:10px;
font-size:14px;
}

/* PRECIO */

.price-input{
width:120px;
padding:8px;
border:1px solid #000;
font-size:14px;
}

/* BOTONES TABLA */

.table-buttons{
display:flex;
gap:5px;
}

.table-buttons button{
padding:6px 8px;
font-size:12px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal.active{
display:flex;
}

.modal-content{
background:#fff;
padding:20px;
width:90%;
max-width:400px;
border:1px solid #000;
}

.modal input,
.modal select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #000;
}

/* ACCESO */

.access{
max-width:350px;
margin:60px auto;
border:1px solid #000;
}

.access-header{
background:#000;
color:#fff;
padding:20px;
text-align:center;
}

.access-body{
padding:20px;
}

.access-body button{
width:100%;
margin-bottom:10px;
}

.message{
position:fixed;
top:20px;
right:20px;
background:#000;
color:#fff;
padding:10px 15px;
}

</style>
</head>

<body>

<!-- ACCESO -->

<div id="accessScreen">

<div class="access">

<div class="access-header">
<h2>Control de Precios</h2>
</div>

<div class="access-body">

<button onclick="enterAs('employee')">
Empleado
</button>

<button onclick="enterAs('admin')">
Administrador
</button>

</div>
</div>

</div>


<!-- SISTEMA -->

<div id="mainScreen" style="display:none;">

<div class="container">

<div class="header">
<h1>Lista de Precios</h1>

<div>
<span id="roleDisplay"></span>
<button class="secondary" onclick="logout()">Salir</button>
</div>

</div>


<!-- TOOLBAR ADMIN -->

<div id="adminToolbar" class="toolbar" style="display:none;">

<button onclick="openModal()">Agregar Producto</button>

<div class="search">
<input id="adminSearch" placeholder="Buscar producto" onkeyup="filterProducts()">
</div>

</div>


<!-- TOOLBAR EMPLEADO -->

<div id="employeeToolbar" class="toolbar" style="display:none;">

<div class="search">
<input id="employeeSearch" placeholder="Buscar producto" onkeyup="filterProducts()">
</div>

</div>


<div class="table-container">

<table>

<thead>
<tr>
<th>Producto</th>
<th>Unidad</th>
<th>Precio</th>
<th id="actionsHeader" style="display:none;">Acciones</th>
</tr>
</thead>

<tbody id="productsTable"></tbody>

</table>

</div>

</div>

</div>


<!-- MODAL -->

<div id="addModal" class="modal">

<div class="modal-content">

<h3>Agregar Producto</h3>

<input id="productName" placeholder="Nombre">

<select id="productUnit">
<option value="kilo">Kilo</option>
<option value="libra">Libra</option>
<option value="unidad">Unidad</option>
</select>

<input id="productPrice" type="number" placeholder="Precio">

<button onclick="addProduct()">Guardar</button>

<button class="secondary" onclick="closeModal()">Cancelar</button>

</div>

</div>



<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:"TU_API_KEY",

authDomain:"lozano-1690859356322.firebaseapp.com",

databaseURL:"https://lozano-1690859356322-default-rtdb.firebaseio.com",

projectId:"lozano-1690859356322",

storageBucket:"lozano-1690859356322.appspot.com",

messagingSenderId:"TU_SENDER_ID",

appId:"TU_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const ref = db.ref("productos");


/* VARIABLES */

let role=null;
let products=[];


/* FIREBASE LISTENER */

ref.on("value",snap=>{

const data=snap.val();

products=data ? Object.entries(data).map(([id,p])=>({id,...p})) : [];

displayProducts();

});


/* ACCESO */

function enterAs(r){

role=r;

sessionStorage.setItem("role",r);

document.getElementById("accessScreen").style.display="none";

document.getElementById("mainScreen").style.display="block";

document.getElementById("roleDisplay").innerText=r;

if(r==="admin"){

document.getElementById("adminToolbar").style.display="flex";

document.getElementById("actionsHeader").style.display="table-cell";

}else{

document.getElementById("employeeToolbar").style.display="flex";

}

displayProducts();

}


function logout(){

sessionStorage.clear();

location.reload();

}


/* TABLA */

function filterProducts(){

displayProducts();

}


function displayProducts(){

let search="";

if(role==="admin"){

const el=document.getElementById("adminSearch");

if(el) search=el.value.toLowerCase();

}else{

const el=document.getElementById("employeeSearch");

if(el) search=el.value.toLowerCase();

}

const filtered=products.filter(p=>p.name.toLowerCase().includes(search));

const tbody=document.getElementById("productsTable");

tbody.innerHTML="";

filtered.forEach(p=>{

const tr=document.createElement("tr");

let unit=p.unit==="kilo"?"kg":p.unit==="libra"?"lb":"unidad";

if(role==="admin"){

tr.innerHTML=`

<td>${p.name}</td>

<td>${unit}</td>

<td>
<input class="price-input" type="number" id="price-${p.id}" value="${p.price}" onchange="updatePrice('${p.id}')">
</td>

<td>

<div class="table-buttons">

<button onclick="editProduct('${p.id}')">Editar</button>

<button onclick="deleteProduct('${p.id}')">Eliminar</button>

</div>

</td>

`;

}else{

tr.innerHTML=`

<td>${p.name}</td>

<td>${unit}</td>

<td>$${Number(p.price).toLocaleString("es-CO")}</td>

`;

}

tbody.appendChild(tr);

});

}


/* CRUD */

function openModal(){

document.getElementById("addModal").classList.add("active");

}

function closeModal(){

document.getElementById("addModal").classList.remove("active");

}


function addProduct(){

const name=document.getElementById("productName").value;

const unit=document.getElementById("productUnit").value;

const price=parseInt(document.getElementById("productPrice").value);

if(!name || !price) return;

ref.push({name,unit,price});

closeModal();

}


function updatePrice(id){

const price=parseInt(document.getElementById("price-"+id).value);

ref.child(id).update({price});

}


function deleteProduct(id){

if(confirm("Eliminar producto?"))

ref.child(id).remove();

}


function editProduct(id){

const p=products.find(x=>x.id===id);

document.getElementById("productName").value=p.name;

document.getElementById("productUnit").value=p.unit;

document.getElementById("productPrice").value=p.price;

openModal();

ref.child(id).remove();

}


/* AUTO LOGIN */

const saved=sessionStorage.getItem("role");

if(saved) enterAs(saved);

</script>

</body>
</html>
